      interval: 10s
      timeout: 5s
      retries: 20

  analytics_service:
    build:
      context: ./backend
    command: uvicorn services.analytics_service.app.main:app --host 0.0.0.0 --port 8007
    environment:
      EVENT_BUS_MODE: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CACHE_MODE: redis
      REDIS_URL: redis://redis:6379/0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: linkedin_sim
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MONGO_URL: mongodb://mongo:27017
      MONGO_DATABASE: linkedin_sim_docs
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET_PROFILE: profile-media
      MINIO_BUCKET_RESUME: resume-media
      MINIO_SECURE: 'false'
      SERVICE_NAME: analytics_service
      APP_VERSION: 1.0.0
      JWT_ISSUER: owner1-auth
      JWT_AUDIENCE: linkedin-clone
      OWNER1_JWKS_URL: http://auth_service:8001/.well-known/jwks.json
    depends_on:
      auth_service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8007/ops/healthz', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 20

  ai_orchestrator_service:
    build:
      context: ./backend
    command: uvicorn services.ai_orchestrator_service.app.main:app --host 0.0.0.0 --port 8008
    environment:
      EVENT_BUS_MODE: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CACHE_MODE: redis
      REDIS_URL: redis://redis:6379/0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: linkedin_sim
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MONGO_URL: mongodb://mongo:27017
      MONGO_DATABASE: linkedin_sim_docs
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET_PROFILE: profile-media
      MINIO_BUCKET_RESUME: resume-media
      MINIO_SECURE: 'false'
      SERVICE_NAME: ai_orchestrator_service
      APP_VERSION: 1.0.0
      JWT_ISSUER: owner1-auth
      JWT_AUDIENCE: linkedin-clone
      OWNER1_JWKS_URL: http://auth_service:8001/.well-known/jwks.json
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash}
      AI_KAFKA_CONSUMERS_ENABLED: ${AI_KAFKA_CONSUMERS_ENABLED:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      MESSAGING_SERVICE_URL: ${MESSAGING_SERVICE_URL:-http://messaging_connections_service:8006}
    depends_on:
      auth_service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/ops/healthz', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    image: node:20
    working_dir: /web
    # HOST=0.0.0.0: dev server must listen on all interfaces inside the container or host:5173 gets ERR_CONNECTION_RESET.
    command: sh -lc "npm install && HOST=0.0.0.0 PORT=5173 WDS_SOCKET_PORT=0 npm start"
    volumes:
      - ./frontend:/web
    environment:
      HOST: "0.0.0.0"
      WDS_SOCKET_PORT: "0"
      REACT_APP_AUTH_URL: http://localhost:8001
      REACT_APP_MEMBER_URL: http://localhost:8002
      REACT_APP_RECRUITER_URL: http://localhost:8003
      REACT_APP_JOB_URL: http://localhost:8004
      REACT_APP_APP_URL: http://localhost:8005
      REACT_APP_MSG_URL: http://localhost:8006
      REACT_APP_ANALYTICS_URL: http://localhost:8007
      REACT_APP_AI_URL: http://localhost:8008
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      auth_service:
        condition: service_healthy
      member_profile_service:
        condition: service_healthy
      recruiter_company_service:
        condition: service_healthy
      jobs_service:
        condition: service_healthy
      applications_service:
        condition: service_healthy
      messaging_connections_service:
        condition: service_healthy
      analytics_service:
        condition: service_healthy
      ai_orchestrator_service:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      start_period: 300s
      interval: 15s
      timeout: 10s
      retries: 40

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  kafka_data:

  minio_data:
