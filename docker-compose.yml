    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/ops/healthz', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 20

  jobs_service:
    build:
      context: ./backend
    command: uvicorn services.jobs_service.app.main:app --host 0.0.0.0 --port 8004
    environment:
      EVENT_BUS_MODE: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CACHE_MODE: redis
      REDIS_URL: redis://redis:6379/0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: linkedin_sim
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MONGO_URL: mongodb://mongo:27017
      MONGO_DATABASE: linkedin_sim_docs
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET_PROFILE: profile-media
      MINIO_BUCKET_RESUME: resume-media
      MINIO_SECURE: 'false'
      SERVICE_NAME: jobs_service
      APP_VERSION: 1.0.0
      JWT_ISSUER: owner1-auth
