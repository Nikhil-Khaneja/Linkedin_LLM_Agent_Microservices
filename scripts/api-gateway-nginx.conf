# =============================================================================
# PHASE 4 — Nginx API Gateway config (AUTOMATED BY AI)
# =============================================================================
# Deploy this on the CENTRAL EC2 instance as a reverse proxy / API gateway.
# Routes /api/v1/<service>/* to the correct backend EC2 instance.
#
# MANUAL STEPS REQUIRED:
#   1. Replace EC2_OWNER1_IP … EC2_OWNER8_IP with actual public IPs/DNS
#   2. Install nginx: apt install nginx  OR  yum install nginx
#   3. Copy to /etc/nginx/conf.d/linkedin-gateway.conf
#   4. nginx -t && systemctl reload nginx
#
# For HTTPS (recommended): use certbot / AWS ACM + ALB instead.
# =============================================================================

# ── Upstream backends ─────────────────────────────────────────────────────────
upstream auth_backend {
    server EC2_OWNER1_IP:8001;   # MANUAL: owner1 public IP
}
upstream member_backend {
    server EC2_OWNER2_IP:8002;   # MANUAL: owner2 public IP
}
upstream recruiter_backend {
    server EC2_OWNER3_IP:8003;   # MANUAL: owner3 public IP
}
upstream job_backend {
    server EC2_OWNER4_IP:8004;   # MANUAL: owner4 public IP
}
upstream application_backend {
    server EC2_OWNER5_IP:8005;   # MANUAL: owner5 public IP
}
upstream analytics_backend {
    server EC2_OWNER7_IP:8007;   # MANUAL: owner7 (this machine or separate)
}
upstream ai_backend {
    server EC2_OWNER8_IP:8008;   # MANUAL: owner8 public IP
}

server {
    listen 80;
    server_name _;               # MANUAL: replace _ with your domain or EC2 public DNS

    # ── CORS headers ──────────────────────────────────────────────────────────
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Health check for the gateway itself ────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"linkedin-gateway"}';
        add_header Content-Type application/json;
    }

    # ── Service routes ─────────────────────────────────────────────────────────
    location /api/v1/auth/ {
        proxy_pass http://auth_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/members/ {
        proxy_pass http://member_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/recruiters/ {
        proxy_pass http://recruiter_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/jobs/ {
        proxy_pass http://job_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/applications/ {
        proxy_pass http://application_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/analytics/ {
        proxy_pass http://analytics_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/agent/ {
        proxy_pass http://ai_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # WebSocket support for AI streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # ── Frontend (if served from same machine) ─────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
    }
}
